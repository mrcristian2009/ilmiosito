<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Robert-Cristian Mocanu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor" id="cursor"></div>
    <div class="gradient-bg"></div>

    <nav class="navbar">
        <div class="nav-indicator"></div>
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="projects.html">Progetti</a>
        <a href="contact.html">Contatti</a>
    </nav>

    <header class="hero-section reveal">
        <span class="badge">Inizia ora</span>
        <h1>Parliamo.</h1>
        <p class="subtitle">Disponibile per consulenze e collaborazioni.</p>
    </header>

    <main>
        <section class="card bento-big reveal" style="max-width: 900px; width: 90%; margin: 0 auto;">
            <div class="card-content">
                <form id="contact-form" class="grid-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label>Nome Completo</label>
                            <input type="text" placeholder="Mario Rossi" required>
                        </div>
                        <div class="input-group">
                            <label>Email Personale</label>
                            <input type="email" placeholder="nome@esempio.it" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Numero di Telefono</label>
                        <input type="tel" placeholder="+39 333 123 4567" required>
                    </div>
                    <div class="input-group">
                        <label>Il tuo messaggio</label>
                        <textarea placeholder="Raccontami la tua idea..." rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn-github" style="align-self: flex-end;">Invia Messaggio</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-footer">
            <a href="https://www.instagram.com/mrcristian.mocanu" class="social-mini-icon" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram"></a>
            <a href="https://github.com/mrcristian" class="social-mini-icon" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub"></a>
        </div>
        <p>© 2026 Robert-Cristian Mocanu</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
