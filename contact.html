<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Robert-Cristian Mocanu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor" id="cursor"></div>
    <div class="gradient-bg"></div>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="projects.html">Progetti</a>
        <a href="contact.html" style="color: #fff;">Contatti</a>
    </nav>

    <header class="hero-section reveal">
        <span class="badge">Iniziamo qualcosa</span>
        <h1>Parliamo del tuo progetto.</h1>
        <p class="elegant-text">Hai un'idea o una proposta? Scrivimi direttamente qui sotto.</p>
    </header>

    <main class="bento-grid">
        <section class="card reveal">
            <form action="https://formspree.io/f/mrbyynll" method="POST" id="contact-form" style="width: 100%;">
                
                <div class="input-group">
                    <label for="email">La tua Email</label>
                    <input type="email" name="email" id="email" placeholder="esempio@email.com" required>
                </div>

                <div class="input-group" style="margin-top: 20px;">
                    <label for="message">Il tuo Messaggio</label>
                    <textarea name="message" id="message" rows="5" placeholder="Come posso aiutarti?" required></textarea>
                </div>

                <button type="submit" class="btn-apple btn-blue" style="width: 100%; border: none; cursor: pointer; margin-top: 30px;">
                    Invia Messaggio
                </button>
            </form>
        </section>
    </main>

    <footer>
        <div class="social-footer">
            <a href="https://www.instagram.com/mrcristian2009" target="_blank" class="social-mini-icon">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg" alt="Instagram">
            </a>
            <a href="https://github.com/mrcristian2009" target="_blank" class="social-mini-icon">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg" alt="GitHub">
            </a>
        </div>
        <p style="color: var(--text-gray); font-size: 12px;">© 2026 Robert-Cristian Mocanu</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
