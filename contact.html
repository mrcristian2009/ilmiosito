    <header>
        <h1>Get in Touch</h1>
        <p class="subtitle">Lavoriamo insieme.</p>
    </header>

    <main>
        <section class="card">
            <form action="https://formspree.io/f/mrbyynll" method="POST" class="contact-form">
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: #86868b; font-size: 14px; text-align: left;">Email</label>
                    <input type="email" name="_replyto" placeholder="tua@email.com" required>
                </div>
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; color: #86868b; font-size: 14px; text-align: left;">Messaggio</label>
                    <textarea name="message" rows="4" placeholder="Come posso aiutarti?" required></textarea>
                </div>
                <button type="submit" class="btn-github" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">Invia Messaggio</button>
            </form>
        </section>
    </main>

    <footer style="margin-top: 120px; padding-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <div class="social-footer">
            <a href="https://instagram.com/tuo_profilo" target="_blank" class="social-mini-icon">
