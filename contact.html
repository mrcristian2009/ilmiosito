<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Robert-Cristian Mocanu</title>
    <link rel="stylesheet" href="style.css">

    <script type="module">
      import { Renderer, Program, Mesh, Triangle } from 'https://cdn.skypack.dev/ogl';
      window.OGL = { Renderer, Program, Mesh, Triangle };
    </script>
</head>
<body>
    <div id="plasma-bg"></div>

    <div class="custom-cursor" id="cursor"></div>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="projects.html">Progetti</a>
        <a href="contact.html" style="color: #fff;">Contatti</a>
    </nav>

    <header class="hero-section reveal">
        <span class="badge">Iniziamo</span>
        <h1>Lavoriamo insieme.</h1>
        <p class="elegant-text">Hai un'idea o un progetto? Scrivimi pure.</p>
    </header>

    <main class="bento-grid">
        <section class="card reveal">
            <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" placeholder="Il tuo nome" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="la-tua@email.com" required>
                </div>
                <div class="input-group">
                    <label>Messaggio</label>
                    <textarea placeholder="Di cosa vuoi parlare?"></textarea>
                </div>
                <button type="submit" class="btn-apple btn-blue">Invia Messaggio</button>
            </form>
        </section>

        <section class="card reveal">
            <div>
                <span class="badge">Risorse</span>
                <h2 style="margin-top: 15px;">Curriculum Vitae</h2>
                <p class="elegant-text">Scarica il mio CV aggiornato o collegati con me su LinkedIn.</p>
                
                <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 25px;">
                    <a href="CV_Robert_Cristian_Mocanu.pdf" download="CV_Robert_Cristian_Mocanu.pdf" class="btn-apple" style="display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: #000 !important; background: #fff;">
                        <span style="font-size: 18px;">📥</span> 
                        <span style="font-weight: 500;">Scarica CV (PDF)</span>
                    </a>

                    <a href="https://www.linkedin.com/in/mrcristian2009/" target="_blank" style="color: var(--apple-blue); text-decoration: none; font-weight: 500; font-size: 14px;">
                        Contattami su LinkedIn
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
